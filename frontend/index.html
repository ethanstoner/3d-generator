<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3d generator</title>
    <link rel="stylesheet" href="/style.css?v=4">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
    <!-- Password Gate -->
    <main id="auth-gate">
        <h1>3d generator</h1>
        <p class="subtitle">enter password to continue</p>
        <div class="input-group">
            <input type="password" id="password-input" placeholder="password" autocomplete="off">
            <button id="auth-btn" onclick="authenticate()">enter</button>
        </div>
        <p id="auth-error" class="error-text hidden"></p>
    </main>

    <!-- Main App -->
    <main id="app" class="hidden">
        <div class="header-row">
            <h1>3d generator</h1>
            <div id="gpu-status" class="status-dot offline">
                <span class="dot"></span>
                <span id="gpu-status-text">checking...</span>
            </div>
        </div>
        <p class="subtitle">upload an image, get a 3d model
            <button class="history-icon" onclick="toggleHistory()" title="history">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
            </button>
        </p>

        <!-- Upload Area -->
        <div id="upload-area" class="upload-area" onclick="document.getElementById('file-input').click()">
            <input type="file" id="file-input" accept=".png,.jpg,.jpeg,.webp" hidden>
            <p id="upload-text">drag & drop an image here, or click to browse</p>
            <img id="upload-preview" class="upload-preview hidden" alt="preview">
        </div>
        <p class="upload-tips">tip: centered subject, plain background, square framing — generation takes ~80s</p>

        <div class="triangle-presets" role="radiogroup" aria-label="triangle count">
            <span class="presets-label">triangles:</span>
            <button type="button" class="preset-chip active" data-value="4000" onclick="selectTriangles(4000)">4k</button>
            <button type="button" class="preset-chip" data-value="10000" onclick="selectTriangles(10000)">10k</button>
            <button type="button" class="preset-chip" data-value="20000" onclick="selectTriangles(20000)">20k</button>
            <button type="button" class="preset-chip" data-value="40000" onclick="selectTriangles(40000)">40k</button>
        </div>

        <button id="generate-btn" onclick="startGeneration()" disabled>generate</button>

        <!-- Progress -->
        <div id="progress-section" class="hidden">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <p id="status-text" class="status-text"></p>
        </div>

        <!-- Error -->
        <div id="error-section" class="hidden">
            <p id="error-text" class="error-text"></p>
        </div>

        <!-- Preview -->
        <div id="preview-section" class="hidden">
            <div class="preview-tabs">
                <button class="tab active" data-tab="textured" onclick="switchTab('textured')">textured</button>
                <button class="tab" data-tab="untextured" onclick="switchTab('untextured')">untextured</button>
                <button class="tab" data-tab="texture" onclick="switchTab('texture')">texture</button>
            </div>

            <div id="tab-textured" class="tab-content active">
                <model-viewer id="viewer-textured" camera-controls auto-rotate shadow-intensity="1" exposure="1" alt="textured 3d model"></model-viewer>
            </div>

            <div id="tab-untextured" class="tab-content">
                <model-viewer id="viewer-untextured" camera-controls auto-rotate shadow-intensity="1" exposure="0.8" environment-image="neutral" alt="untextured 3d model"></model-viewer>
            </div>

            <div id="tab-texture" class="tab-content">
                <img id="texture-image" class="texture-image" alt="texture map">
            </div>

            <a id="download-btn" class="download-btn">download zip</a>
        </div>

        <!-- History -->
        <div id="history-list" class="history-list hidden"></div>
    </main>

    <script src="/app.js?v=4"></script>
</body>
</html>
